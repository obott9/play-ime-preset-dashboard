# Play Framework 3.0 + Scala Configuration

play.http.secret.key = "changeme-generate-a-real-secret-for-production"

# Slick + PostgreSQL (Supabase direct connection)
# Set via environment variables:
#   SUPABASE_DB_HOST, SUPABASE_DB_PASSWORD, SUPABASE_PROJECT_REF
slick.dbs.default {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    driver = org.postgresql.Driver
    url = "jdbc:postgresql://"${?SUPABASE_DB_HOST}":6543/postgres?prepareThreshold=0"
    user = "postgres."${?SUPABASE_PROJECT_REF}
    password = ${?SUPABASE_DB_PASSWORD}
    numThreads = 5
    maxConnections = 5
  }
}

# Play Filters
play.filters.enabled += "play.filters.cors.CORSFilter"
play.filters.cors {
  allowedOrigins = ["http://localhost:3000", "https://obott9.github.io"]
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowedHttpHeaders = ["Accept", "Content-Type", "Origin"]
}

# Disable evolutions for existing Supabase tables
play.evolutions.enabled = false

# JSON parser
play.http.parser.maxMemoryBuffer = 256K
